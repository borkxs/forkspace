workspace: acme
slotSize: 10

environments:
  dev:
    persistent: true
    services:
      mysql:
        compose: my-api/docker-compose.yml
        service: db
        basePort: 3306
        containerPort: 3306
        exports:
          DATABASE_URL: "mysql://root:root@{host}:{port}/acmepay"
      dynamodb:
        compose: my-api/docker-compose.yml
        service: dynamodb
        basePort: 8000
        containerPort: 8000
        exports:
          DYNAMO_ENDPOINT: "http://{host}:{port}"
      queue:
        compose: my-api/docker-compose.yml
        service: elasticmq
        basePort: 9324
        containerPort: 9324
        exports:
          SQS_ENDPOINT: "http://{host}:{port}"
      s3:
        compose: my-api/docker-compose.yml
        service: minio
        basePort: 9000
        containerPort: 9000
        exports:
          S3_ENDPOINT: "http://{host}:{port}"

  test:
    persistent: false
    allocations:
      app:
        basePort: 4100
    services:
      mysql:
        compose: my-api/docker-compose.yml
        service: db
        basePort: 3406
        containerPort: 3306
        isolation: namespace
        exports:
          DATABASE_URL: "mysql://root:root@{host}:{port}/{ns}"
      dynamodb:
        compose: my-api/docker-compose.yml
        service: dynamodb
        basePort: 8100
        containerPort: 8000
        isolation: shared
        exports:
          DYNAMO_ENDPOINT: "http://{host}:{port}"
      queue:
        compose: my-api/docker-compose.yml
        service: elasticmq
        basePort: 9424
        containerPort: 9324
        isolation: shared
        exports:
          SQS_ENDPOINT: "http://{host}:{port}"
      s3:
        compose: my-api/docker-compose.yml
        service: minio
        basePort: 9100
        containerPort: 9000
        isolation: shared
        exports:
          S3_ENDPOINT: "http://{host}:{port}"
    hooks:
      bootstrap: npm --prefix my-api run local:bootstrap
      seed: npm --prefix my-api run local:seed-test
      forkCreate: my-api/scripts/fork-create.sh
      forkDestroy: my-api/scripts/fork-destroy.sh
